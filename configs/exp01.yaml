# 实验配置：小模型快速验证
# 用途：用于代码调试和快速迭代，不建议用于生产

# 继承base.yaml的所有参数，仅覆盖以下部分
project_name: "crnn_ocr_exp01"

model:
  backbone: "cnn6"  # 轻量级网络
  hidden_size: 128  # 减少参数量

train:
  # --- 修改点：显式写明设备，防止被覆盖 ---
  device: "cpu"

  batch_size: 64    # 适配小显存
  epochs: 10        # 快速验证流程
  lr: 0.01          # 较高学习率加速收敛
  output_dir: "./checkpoints/exp01"  # 实验独立目录
  log_every: 20     # 更频繁打印

# 关闭不必要的功能以加速
logging:
  level: "DEBUG"

mixed_precision:
  enabled: false  # 实验环境可关闭

# 记录实验说明（注释不会干扰YAML解析）
# 预期：CER ~15%, WER ~30%（快速验证无需高精度）