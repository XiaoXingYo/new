# 基础配置
project_name: "crnn_ocr_base"

# 数据配置
data:
  height: 32  #手写或印刷体文本识别，图像通常会被归一化到固定高度（如 32 像素），宽度按比例缩放或固定（128 像素）
  width: 192
  chars: "0123456789+-*/="
  blank_label: 15 #处理字符之间的空白或重复字符 由于这里只对0-9这十个数进行识别之后若增加识别的字符要把它设置为最后一个数
  emnist_dir: "./data"
  augment: true # 数据增强
  seq_len_range: [4, 12] #最小时间步长公式为：T_{min} = 2N-1 比如18位身份证最小需要35步
  val_ratio: 0.1

# 模型配置
model:
  backbone: "resnet18"  # vgg/resnet18/cnn6
  hidden_size: 256
  rnn_layers: 2
  bidirectional: true
  dropout: 0.2

# 训练配置
train:
  batch_size: 128
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  save_every: 5
  val_every: 1
  log_every: 50
  device: "cuda"
  output_dir: "./checkpoints"
  resume: null
  scheduler:
    type: "OneCycleLR"  # OneCycleLR/StepLR/CosineAnnealingLR
    pct_start: 0.1      # WarmUp占比
    div_factor: 25      # 初始lr = max_lr / div_factor
    final_div_factor: 1000  # 最终lr = max_lr / final_div_factor

  # --- 新增：早停机制 ---
  early_stopping:
    enabled: true
    patience: 10        # CER不下降的最大epoch数
    min_delta: 0.01     # 最小改进量

# 推理配置
inference:
  model_path: "./checkpoints/best_ctc.pth"
  decode_type: "beam_search"  # greedy/beam_search
  beam_width: 5

# --- 新增：日志与监控 ---
logging:
  level: "INFO"  # DEBUG/INFO/WARNING/ERROR
  log_dir: "./logs"
  print_freq: 50  # 控制台打印频率

# --- 新增：实验追踪（可选） ---
tracking:
  enabled: false  # 设为true需安装wandb/tensorboard
  type: "wandb"   # wandb/tensorboard
  project: "crnn-ocr"
  entity: null    # wandb团队名

# --- 新增：混合精度训练 ---
mixed_precision:
  enabled: true  # 需要GPU和PyTorch>=1.6
  opt_level: "O1"  # apex/mixed precision level

# --- 新增：梯度累积 ---
gradient_accumulation:
  enabled: false
  steps: 4  # 模拟batch_size * 4的大批次

# --- 新增：可复现性 ---
seed: 42  # 随机种子