# 生产环境配置
# 覆盖base.yaml以达到最佳性能

project_name: "crnn_ocr_prod"

model:
  backbone: "resnet18"  # 更高精度
  hidden_size: 512      # 更大模型容量
  dropout: 0.3          # 更强的正则化

train:
  # --- 修改点：显式写明设备，解决之前的覆盖失效问题 ---
  device: "cpu"

  batch_size: 256       # 利用大显存
  epochs: 100           # 充分训练
  lr: 0.0005            # 更小学习率稳定收敛
  weight_decay: 0.0005  # 更强的正则化
  output_dir: "/mnt/models/crnn_ocr"  # 持久化存储
  log_every: 100        # 减少日志IO

  scheduler:
    pct_start: 0.05     # 更短的WarmUp
    div_factor: 10      # 更稳定的初始lr

  early_stopping:
    enabled: true
    patience: 15        # 更耐心的早停

data:
  augment: true
  emnist_dir: "/data/emnist"  # 共享数据盘
  seq_len_range: [4, 8]       # 更长的序列

# 生产监控
logging:
  level: "INFO"
  print_freq: 100

tracking:
  enabled: true       # 生产环境必须开启追踪
  type: "wandb"
  project: "crnn-ocr-prod"

# 性能优化
mixed_precision:
  enabled: true       # 加速训练

gradient_accumulation:
  enabled: false      # 生产环境通常使用大batch

seed: 42  # 固定种子确保可复现