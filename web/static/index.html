<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>手写推演系统</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0d1117; overflow: hidden; font-family: monospace; }
        canvas { display: block; cursor: crosshair; }
        .controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        button { background: transparent; border: 1px solid #30363d; color: #8b949e; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button:hover { border-color: #c9d1d9; color: #c9d1d9; }
        #status { position: absolute; bottom: 20px; left: 20px; color: #484f58; font-size: 12px; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="clearCanvas()">Clear</button>
    </div>
    <canvas id="board"></canvas>
    <div id="status">Ready.</div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        let isDrawing = false, lastX = 0, lastY = 0, timer = null, maxX = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = Math.max(15, Math.floor(window.innerHeight / 15));
        }
        window.addEventListener('resize', resize); resize();

        function clearCanvas() { resize(); status.innerText = "Ready."; maxX = 0; }

        canvas.addEventListener('mousedown', e => {
            isDrawing = true; [lastX, lastY] = [e.clientX, e.clientY];
            clearTimeout(timer);
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDrawing) return;
            ctx.strokeStyle = '#c9d1d9';
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(e.clientX, e.clientY); ctx.stroke();
            [lastX, lastY] = [e.clientX, e.clientY];
            if (e.clientX > maxX) maxX = e.clientX;
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            status.innerText = "Processing...";
            timer = setTimeout(triggerAI, 1200); // 停笔1.2秒自动触发
        });

        async function triggerAI() {
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = canvas.width; tmpCanvas.height = canvas.height;
            const tCtx = tmpCanvas.getContext('2d');
            tCtx.fillStyle = "black"; tCtx.fillRect(0, 0, tmpCanvas.width, tmpCanvas.height);
            tCtx.drawImage(canvas, 0, 0);

            try {
                const res = await fetch('/api/recognize', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image_base64: tmpCanvas.toDataURL('image/jpeg', 0.8) })
                });
                const data = await res.json();
                status.innerText = `Recognized: ${data.result}`;

                if (data.calc) {
                    ctx.fillStyle = '#ff7b72'; // 柔和的警示红/橙
                    ctx.font = 'bold 32px monospace';
                    ctx.fillText(data.calc, maxX + 25, lastY + 10);
                }
            } catch (err) { status.innerText = "Error connected to local engine."; }
        }
    </script>
</body>
</html>
